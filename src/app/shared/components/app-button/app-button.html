@if (routerLink) {
  <button
      [routerLink]="routerLink"
      [class]="customClass || 'ps-7 pe-3 py-4 bg-[#B91C17] text-white rounded-full flex items-center justify-center transition duration-300 cursor-pointer'">
    {{ btnText }}
    <img src="images/icons/arrow-left.webp" alt="" width="22" height="22" loading="lazy" decoding="async" class="h-[22px] w-[22px] p-0.5 ms-5 bg-white rounded-full" style="aspect-ratio: 1/1; min-width: 22px; min-height: 22px;">
  </button>
} @else {
  <button
      [disabled]="disabled"
      (click)="onClick()"
      [class]="customClass || 'ps-7 pe-3 py-4 bg-[#B91C17] text-white rounded-full flex items-center justify-center transition duration-300 cursor-pointer'"
      [class.opacity-50]="disabled"
      [class.cursor-not-allowed]="disabled">
    {{ btnText }}
    <img src="images/icons/arrow-left.webp" alt="" width="22" height="22" loading="lazy" decoding="async" class="h-[22px] w-[22px] p-0.5 ms-5 bg-white rounded-full" style="aspect-ratio: 1/1; min-width: 22px; min-height: 22px;">
  </button>
}
